<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon restaurant — Commande-IA</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #f0f2f0; min-height: 100vh; color: #1a2a1a; }

    .topbar { background: #1a3a1a; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 64px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 17px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .user-badge { font-size: 12px; color: #a8e07a; font-weight: 500; }
    .page-badge { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; background: rgba(168,224,122,0.15); color: #a8e07a; padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(168,224,122,0.25); }
    .btn-topbar { font-size: 12px; padding: 6px 14px; border-radius: 7px; border: 1px solid rgba(200,232,200,0.2); background: rgba(255,255,255,0.08); color: #c8e8c8; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; font-weight: 500; transition: all 0.15s; }
    .btn-topbar:hover { background: rgba(255,255,255,0.15); color: #fff; }

    .main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .resto-header { background: #fff; border-radius: 16px; padding: 24px 28px; border: 1.5px solid #e0ecd8; margin-bottom: 28px; display: flex; align-items: center; gap: 20px; }
    .resto-avatar { width: 56px; height: 56px; border-radius: 14px; background: #e8f5dc; border: 1.5px solid #c0e090; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #2d6a0a; flex-shrink: 0; }
    .resto-name { font-size: 22px; font-weight: 800; color: #1a2a1a; letter-spacing: -0.5px; }
    .resto-info { font-size: 13px; color: #9ab89a; margin-top: 4px; }
    .resto-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-top: 6px; background: #e8f5dc; color: #2d6a0a; border: 1px solid #c0e090; }
    .resto-stats { display: flex; gap: 20px; margin-left: auto; }
    .resto-stat { text-align: center; }
    .resto-stat-value { font-size: 24px; font-weight: 800; color: #1a2a1a; line-height: 1; }
    .resto-stat-label { font-size: 9px; font-weight: 600; color: #9ab89a; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    .tabs { display: flex; gap: 4px; background: #fff; padding: 4px; border-radius: 10px; border: 1.5px solid #e0ecd8; width: fit-content; }
    .tab { font-size: 13px; padding: 7px 20px; border-radius: 7px; border: none; background: transparent; color: #7aaa7a; cursor: pointer; font-weight: 500; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .tab:hover { background: #f4f8f0; }
    .tab.active { background: #1a3a1a; color: #a8e07a; font-weight: 600; }

    .section { display: none; }
    .section.active { display: block; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-size: 15px; font-weight: 700; color: #1a2a1a; }

    .menu-filters { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn { font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e0ecd8; background: #fff; color: #5a7a5a; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.15s; }
    .filter-btn:hover { border-color: #9ad870; }
    .filter-btn.active { background: #1a3a1a; color: #a8e07a; border-color: #1a3a1a; }
    .filter-count { font-size: 10px; opacity: 0.7; margin-left: 4px; }

    .btn-add { font-size: 12px; padding: 8px 18px; border-radius: 10px; border: none; background: #3B6D11; color: #fff; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; transition: all 0.15s; box-shadow: 0 2px 8px rgba(59,109,17,0.2); display: flex; align-items: center; gap: 6px; }
    .btn-add:hover { background: #2d5c0a; transform: translateY(-1px); }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .menu-card { background: #fff; border: 1.5px solid #e0ecd8; border-radius: 16px; padding: 16px; position: relative; transition: all 0.2s; animation: cardIn 0.3s ease both; }
    @keyframes cardIn { from { opacity:0; transform: translateY(8px); } }
    .menu-card:hover { border-color: #9ad870; box-shadow: 0 4px 16px rgba(59,109,17,0.08); transform: translateY(-2px); }
    .menu-card.selected { border-color: #3B6D11; border-width: 2px; box-shadow: 0 4px 20px rgba(59,109,17,0.12); }
    .menu-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .menu-card-name { font-size: 14px; font-weight: 700; color: #1a2a1a; }
    .menu-cat-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
    .cat-sandwich { background: #e8f0ff; color: #2a50aa; border: 1px solid #b0c8f8; }
    .cat-boisson { background: #e8f5dc; color: #2d6a0a; border: 1px solid #c0e090; }
    .cat-accompagnement { background: #fff8e8; color: #906010; border: 1px solid #e8d090; }
    .cat-dessert { background: #fdf0ff; color: #8030aa; border: 1px solid #e0b0f0; }
    .cat-menu { background: #f0e8ff; color: #5030aa; border: 1px solid #c0a8f0; }
    .menu-card-divider { height: 1px; background: #f0f5ee; margin: 8px 0; }
    .menu-card-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; }
    .menu-card-key { color: #9ab89a; }
    .menu-card-val { color: #1a2a1a; font-weight: 600; }
    .menu-ingredients { font-size: 11px; color: #7aaa7a; margin-top: 6px; line-height: 1.5; }
    .menu-retirables { font-size: 11px; color: #906010; margin-top: 4px; background: #fff8e8; padding: 4px 8px; border-radius: 6px; }
    .menu-allergenes { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .allergen-badge { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: #fef0f0; color: #b03030; border: 1px solid #f0c0c0; }
    .menu-card-actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f5ee; }
    .btn-edit { font-size: 11px; padding: 6px 12px; border-radius: 8px; border: 1px solid #e0ecd8; background: #f8faf6; color: #5a7a5a; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; flex: 1; transition: all 0.15s; }
    .btn-edit:hover { background: #e8f5dc; border-color: #3B6D11; color: #3B6D11; }
    .btn-delete { font-size: 11px; padding: 6px 12px; border-radius: 8px; border: 1px solid #f0c0c0; background: #fef8f8; color: #b03030; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.15s; }
    .btn-delete:hover { background: #fef0f0; }
    .btn-duplicate { font-size: 11px; padding: 6px 12px; border-radius: 8px; border: 1px solid #e0ecd8; background: #f8faf6; color: #5a7a5a; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.15s; }
    .btn-duplicate:hover { background: #e8f5dc; border-color: #3B6D11; color: #3B6D11; }
    .btn-select { font-size: 11px; padding: 6px 8px; border-radius: 8px; border: 1px solid #e0ecd8; background: #f8faf6; color: #9ab89a; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.15s; }
    .btn-select:hover { background: #e8f5dc; }
    .btn-select.active { background: #e8f5dc; border-color: #3B6D11; color: #3B6D11; }

    .horaires-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .horaire-item { background: #fff; border: 1.5px solid #e0ecd8; border-radius: 10px; padding: 12px; }
    .horaire-day { font-size: 12px; font-weight: 700; color: #3B6D11; margin-bottom: 4px; }
    .horaire-time { font-size: 13px; color: #1a2a1a; font-weight: 500; }
    .horaire-closed { font-size: 13px; color: #9ab89a; }

    .info-block { background: #fff; border: 1.5px solid #e0ecd8; border-radius: 14px; padding: 20px; margin-bottom: 14px; }
    .info-title { font-size: 11px; font-weight: 700; color: #7aaa7a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f5ee; font-size: 13px; }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: #9ab89a; font-weight: 500; }
    .info-val { color: #1a2a1a; font-weight: 600; }

    .loading { text-align: center; font-size: 13px; color: #9ab89a; padding: 40px 0; }
    .empty { text-align: center; font-size: 13px; color: #9ab89a; padding: 40px 0; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 20px; padding: 28px; width: 100%; max-width: 520px; max-height: 85vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,0.15); animation: modalIn 0.25s cubic-bezier(0.22,1,0.36,1); }
    @keyframes modalIn { from { opacity:0; transform: scale(0.93) translateY(10px); } }
    .modal-title { font-size: 17px; font-weight: 800; color: #1a2a1a; margin-bottom: 20px; }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 11px; font-weight: 700; color: #7aaa7a; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; display: block; }
    .form-input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #e0ecd8; background: #f8faf6; font-size: 13px; font-family: 'DM Sans', sans-serif; color: #1a2a1a; outline: none; transition: all 0.15s; }
    .form-input:focus { border-color: #4a8a1a; background: #fff; }
    .form-select { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #e0ecd8; background: #f8faf6; font-size: 13px; font-family: 'DM Sans', sans-serif; color: #1a2a1a; outline: none; }
    .form-textarea { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #e0ecd8; background: #f8faf6; font-size: 13px; font-family: 'DM Sans', sans-serif; color: #1a2a1a; outline: none; resize: vertical; min-height: 50px; transition: all 0.15s; }
    .form-textarea:focus { border-color: #4a8a1a; background: #fff; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-row-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
    .form-check { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #5a7a5a; margin-top: 6px; }
    .form-check input { accent-color: #3B6D11; }
    .allergenes-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 6px; }
    .allergen-chip { font-size: 10px; padding: 5px 6px; border-radius: 6px; border: 1.5px solid #e0ecd8; background: #f8faf6; color: #5a7a5a; cursor: pointer; text-align: center; transition: all 0.15s; font-weight: 500; }
    .allergen-chip:hover { border-color: #f0c0c0; }
    .allergen-chip.selected { background: #fef0f0; border-color: #f0c0c0; color: #b03030; font-weight: 600; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-save { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #3B6D11; color: #fff; font-size: 13px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; }
    .btn-save:hover { background: #2d5c0a; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-cancel { flex: 1; padding: 12px; border-radius: 10px; border: 1.5px solid #e0ecd8; background: #fff; color: #5a7a5a; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; }
    .btn-cancel:hover { background: #f8faf6; }

    /* ── Nouveaux éléments ── */
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-box { position: relative; flex: 1; max-width: 280px; }
    .search-box input { width: 100%; padding: 9px 14px 9px 36px; border-radius: 10px; border: 1.5px solid #e0ecd8; background: #fff; font-size: 12px; font-family: 'DM Sans', sans-serif; color: #1a2a1a; outline: none; transition: all 0.15s; }
    .search-box input::placeholder { color: #9ab89a; }
    .search-box input:focus { border-color: #4a8a1a; box-shadow: 0 0 0 3px rgba(59,109,17,0.08); }
    .search-box svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: #9ab89a; }
    .search-shortcut { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 9px; font-weight: 600; color: #c0d8b0; background: #f0f5ee; padding: 2px 6px; border-radius: 4px; border: 1px solid #e0ecd8; pointer-events: none; }
    .view-toggle { display: flex; gap: 2px; background: #fff; padding: 3px; border-radius: 8px; border: 1.5px solid #e0ecd8; }
    .view-btn { width: 32px; height: 32px; border: none; background: transparent; color: #9ab89a; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .view-btn:hover { color: #5a7a5a; }
    .view-btn.active { background: #e8f5dc; color: #3B6D11; }
    .list-view { display: none; }
    .list-view.active { display: block; }
    .list-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
    .list-table th { font-size: 10px; font-weight: 700; color: #9ab89a; text-transform: uppercase; letter-spacing: 1px; padding: 8px 14px; text-align: left; }
    .list-table td { padding: 10px 14px; background: #fff; font-size: 13px; border-top: 1.5px solid #e0ecd8; border-bottom: 1.5px solid #e0ecd8; }
    .list-table tr td:first-child { border-left: 1.5px solid #e0ecd8; border-radius: 10px 0 0 10px; }
    .list-table tr td:last-child { border-right: 1.5px solid #e0ecd8; border-radius: 0 10px 10px 0; }
    .list-table tr:hover td { background: #f8faf6; border-color: #9ad870; }
    .list-name { font-weight: 700; color: #1a2a1a; }
    .list-price { font-weight: 600; color: #1a2a1a; }
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: #fff; border: 1.5px solid #e0ecd8; border-radius: 12px; padding: 12px 18px; font-size: 12px; font-weight: 500; color: #1a2a1a; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; animation: toastIn 0.35s ease both; min-width: 260px; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } }
    .toast.success { border-left: 3px solid #3B6D11; }
    .toast.error { border-left: 3px solid #b03030; }
    .toast-icon { font-size: 15px; }
    .bulk-bar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #fff; border: 1.5px solid #e0ecd8; border-radius: 14px; padding: 10px 20px; display: flex; align-items: center; gap: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); z-index: 150; transition: all 0.3s cubic-bezier(0.22,1,0.36,1); opacity: 0; pointer-events: none; }
    .bulk-bar.visible { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: all; }
    .bulk-count { font-size: 12px; font-weight: 700; color: #3B6D11; }
    .bulk-btn { font-size: 11px; padding: 7px 14px; border-radius: 8px; border: 1px solid #e0ecd8; background: #fff; color: #5a7a5a; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; transition: all 0.15s; }
    .bulk-btn:hover { background: #e8f5dc; border-color: #3B6D11; color: #3B6D11; }
    .bulk-btn.danger { border-color: #f0c0c0; color: #b03030; }
    .bulk-btn.danger:hover { background: #fef0f0; }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .search-box { max-width: 100%; }
      .form-row-3 { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .resto-header { flex-direction: column; align-items: flex-start; }
      .resto-stats { margin-left: 0; margin-top: 12px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="logo" id="burger-anchor">Commande<span style="color:#a8e07a">IA</span></div>
    <div class="page-badge">Restaurant</div>
  </div>
  <div class="topbar-right">
    <span class="user-badge" id="user-name">Chargement...</span>
    <a href="/" class="btn-topbar">← Dashboard</a>
    <button class="btn-topbar" onclick="deconnexion()">Déconnexion</button>
  </div>
</div>
<script src="/burger-menu.js"></script>

<div class="main">
  <div class="resto-header" id="resto-header">
    <div class="loading">Chargement des informations du restaurant...</div>
  </div>

  <div class="toolbar">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('menu', this)">Menu & Carte</button>
      <button class="tab" onclick="switchTab('horaires', this)">Horaires</button>
      <button class="tab" onclick="switchTab('infos', this)">Informations</button>
    </div>
    <div class="search-box" id="search-wrapper">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="search-input" placeholder="Rechercher un produit..." oninput="searchMenu(this.value)" />
      <span class="search-shortcut">/</span>
    </div>
    <div class="view-toggle" id="view-toggle-wrapper">
      <button class="view-btn active" id="view-grid-btn" onclick="setView('grid')" title="Grille">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
      </button>
      <button class="view-btn" id="view-list-btn" onclick="setView('list')" title="Liste">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
      </button>
    </div>
    <button class="btn-add" onclick="openModal()">+ Ajouter un produit</button>
  </div>

  <div class="section active" id="section-menu">
    <div class="menu-filters" id="menu-filters"></div>
    <div class="grid" id="grid-menu"><div class="loading">Chargement du menu...</div></div>
    <div class="list-view" id="list-menu"></div>
  </div>

  <div class="section" id="section-horaires">
    <div class="section-header"><div class="section-title">Horaires d'ouverture</div></div>
    <div class="horaires-grid" id="grid-horaires"><div class="loading">Chargement...</div></div>
  </div>

  <div class="section" id="section-infos">
    <div class="section-header"><div class="section-title">Informations du restaurant</div></div>
    <div id="grid-infos"><div class="loading">Chargement...</div></div>
  </div>
</div>

<div class="bulk-bar" id="bulk-bar">
  <span class="bulk-count" id="bulk-count">0 sélectionné(s)</span>
  <button class="bulk-btn" onclick="bulkToggleAvailability()">Basculer dispo</button>
  <button class="bulk-btn danger" onclick="bulkDelete()">Supprimer</button>
  <button class="bulk-btn" onclick="clearSelection()">Annuler</button>
</div>

<div class="toast-container" id="toast-container"></div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-title">Ajouter un produit</div>
    <div class="form-row-3">
      <div class="form-group"><label class="form-label">Nom du produit</label><input class="form-input" id="m-nom" placeholder="Ex: Big Mac" /></div>
      <div class="form-group"><label class="form-label">Catégorie</label><select class="form-select" id="m-cat"><option>Sandwich</option><option>Boisson</option><option>Accompagnement</option><option>Dessert</option><option>Menu</option></select></div>
      <div class="form-group"><label class="form-label">Prix seul (€)</label><input class="form-input" id="m-prix" type="number" step="0.01" placeholder="6.00" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Prix menu (€)</label><input class="form-input" id="m-prix-menu" type="number" step="0.01" placeholder="11.00" /></div>
      <div class="form-group"><label class="form-label">Temps préparation (min)</label><input class="form-input" id="m-temps" type="number" placeholder="5" /></div>
    </div>
    <label class="form-check"><input type="checkbox" id="m-dispo-menu" /> Disponible en menu (frites + boisson)</label>
    <div style="height:12px"></div>
    <div class="form-group"><label class="form-label">Composition / Ingrédients</label><textarea class="form-textarea" id="m-ingredients" placeholder="pain, steak, salade, tomate..."></textarea></div>
    <div class="form-group"><label class="form-label">Ingrédients retirables (séparés par des virgules)</label><input class="form-input" id="m-retirables" placeholder="cornichons, oignons, sauce" /></div>
    <div class="form-group"><label class="form-label">Allergènes présents</label><div class="allergenes-grid" id="allergenes-grid"></div></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" id="btn-save" onclick="saveProduct()">Ajouter</button>
    </div>
  </div>
</div>

<script>
  const user = sessionStorage.getItem('user');
  if (!user) window.location.href = '/login.html?redirect=/restaurant.html';
  const currentUser = JSON.parse(user || '{}');
  document.getElementById('user-name').textContent = currentUser.nom;

  let allMenuItems = [], restoData = null, editingProductId = null, selectedAllergenes = [];
  let currentView = 'grid', currentFilter = 'tous', searchQuery = '', selectedItems = new Set();
  const ALLERGENES = ['Gluten','Lactose','Oeufs','Arachides','Fruits à coque','Soja','Poisson','Crustacés','Céleri','Moutarde','Sésame','Sulfites','Lupin','Mollusques'];

  const ag = document.getElementById('allergenes-grid');
  ALLERGENES.forEach(a => {
    const chip = document.createElement('div');
    chip.className = 'allergen-chip'; chip.textContent = a;
    chip.onclick = () => { chip.classList.toggle('selected'); if (chip.classList.contains('selected')) selectedAllergenes.push(a); else selectedAllergenes = selectedAllergenes.filter(x => x !== a); };
    ag.appendChild(chip);
  });

  function initials(name) { return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2); }

  function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.innerHTML = '<span class="toast-icon">' + (type === 'success' ? '✅' : '❌') + '</span>' + msg;
    c.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(20px)'; t.style.transition = '0.3s'; setTimeout(() => t.remove(), 300); }, 3000);
  }

  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('section-' + tab).classList.add('active');
    document.getElementById('search-wrapper').style.display = tab === 'menu' ? '' : 'none';
    document.getElementById('view-toggle-wrapper').style.display = tab === 'menu' ? '' : 'none';
  }

  function setView(view) {
    currentView = view;
    document.getElementById('view-grid-btn').classList.toggle('active', view === 'grid');
    document.getElementById('view-list-btn').classList.toggle('active', view === 'list');
    applyFilters();
  }

  function searchMenu(q) { searchQuery = q.toLowerCase().trim(); applyFilters(); }

  function buildFilters() {
    const fc = document.getElementById('menu-filters');
    fc.innerHTML = '';
    ['tous','Sandwich','Boisson','Accompagnement','Dessert','Menu'].forEach(cat => {
      const count = cat === 'tous' ? allMenuItems.length : allMenuItems.filter(p => p.categorie === cat).length;
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (cat === currentFilter ? ' active' : '');
      btn.innerHTML = (cat === 'tous' ? 'Tous' : cat) + '<span class="filter-count">(' + count + ')</span>';
      btn.onclick = () => { currentFilter = cat; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); applyFilters(); };
      fc.appendChild(btn);
    });
  }

  function getFilteredItems() {
    let items = currentFilter === 'tous' ? [...allMenuItems] : allMenuItems.filter(p => p.categorie === currentFilter);
    if (searchQuery) items = items.filter(p => (p.nom || '').toLowerCase().includes(searchQuery) || (p.ingredients || '').toLowerCase().includes(searchQuery) || (p.categorie || '').toLowerCase().includes(searchQuery));
    return items;
  }

  function applyFilters() {
    const items = getFilteredItems();
    if (currentView === 'grid') { document.getElementById('grid-menu').style.display = ''; document.getElementById('list-menu').style.display = 'none'; renderGridView(items); }
    else { document.getElementById('grid-menu').style.display = 'none'; document.getElementById('list-menu').style.display = 'block'; document.getElementById('list-menu').classList.add('active'); renderListView(items); }
  }

  function toggleSelect(id, e) { if (e) e.stopPropagation(); if (selectedItems.has(id)) selectedItems.delete(id); else selectedItems.add(id); updateBulkBar(); applyFilters(); }
  function clearSelection() { selectedItems.clear(); updateBulkBar(); applyFilters(); }
  function updateBulkBar() {
    const bar = document.getElementById('bulk-bar');
    if (selectedItems.size > 0) { bar.classList.add('visible'); document.getElementById('bulk-count').textContent = selectedItems.size + ' sélectionné(s)'; }
    else bar.classList.remove('visible');
  }
  async function bulkDelete() {
    if (!confirm('Supprimer ' + selectedItems.size + ' produit(s) ?')) return;
    for (const id of selectedItems) { try { await fetch('/admin/menus/' + id, { method: 'DELETE' }); } catch(e) {} }
    toast(selectedItems.size + ' produit(s) supprimé(s)');
    selectedItems.clear(); updateBulkBar(); await reloadMenu();
  }
  function bulkToggleAvailability() {
    selectedItems.forEach(id => { const item = allMenuItems.find(p => p.id === id); if (item) item.unavailable = !item.unavailable; });
    toast('Disponibilité mise à jour'); clearSelection(); applyFilters();
  }

  function renderGridView(items) {
    const grid = document.getElementById('grid-menu');
    if (!items.length) { grid.innerHTML = '<div class="empty">Aucun produit dans cette catégorie.</div>'; return; }
    grid.innerHTML = '';
    items.forEach((p, i) => {
      const catClass = 'cat-' + (p.categorie || '').toLowerCase();
      const isSelected = selectedItems.has(p.id);
      const card = document.createElement('div');
      card.className = 'menu-card' + (isSelected ? ' selected' : '');
      card.style.animationDelay = (i * 0.04) + 's';
      card.innerHTML = '<div class="menu-card-top"><div class="menu-card-name">' + (p.nom || '—') + '</div><span class="menu-cat-badge ' + catClass + '">' + (p.categorie || '—') + '</span></div>'
        + '<div class="menu-card-divider"></div>'
        + '<div class="menu-card-row"><span class="menu-card-key">Prix seul</span><span class="menu-card-val">' + (p.prix ? p.prix.toFixed(2) + ' €' : '—') + '</span></div>'
        + (p.dispoMenu ? '<div class="menu-card-row"><span class="menu-card-key">Prix menu</span><span class="menu-card-val">' + (p.prixMenu ? p.prixMenu.toFixed(2) + ' €' : '—') + '</span></div>' : '')
        + (p.tempsPrepare ? '<div class="menu-card-row"><span class="menu-card-key">Préparation</span><span class="menu-card-val">' + p.tempsPrepare + ' min</span></div>' : '')
        + (p.ingredients ? '<div class="menu-ingredients">' + p.ingredients + '</div>' : '')
        + (p.ingredientsRetirables ? '<div class="menu-retirables">Retirables : ' + p.ingredientsRetirables + '</div>' : '')
        + (p.allergenes?.length ? '<div class="menu-allergenes">' + p.allergenes.map(a => '<span class="allergen-badge">' + a + '</span>').join('') + '</div>' : '')
        + '<div class="menu-card-actions">'
        + '<button class="btn-select ' + (isSelected ? 'active' : '') + '" onclick="event.stopPropagation();toggleSelect(\'' + p.id + '\',event)">' + (isSelected ? '☑' : '☐') + '</button>'
        + '<button class="btn-edit" onclick="event.stopPropagation();openModal(\'' + p.id + '\')">✏️ Modifier</button>'
        + '<button class="btn-duplicate" onclick="event.stopPropagation();duplicateProduct(\'' + p.id + '\')">📋 Dupliquer</button>'
        + '<button class="btn-delete" onclick="event.stopPropagation();deleteProduct(\'' + p.id + '\', \'' + (p.nom || '').replace(/'/g, "\\'") + '\')">🗑️</button>'
        + '</div>';
      grid.appendChild(card);
    });
  }

  function renderListView(items) {
    const list = document.getElementById('list-menu');
    if (!items.length) { list.innerHTML = '<div class="empty">Aucun produit dans cette catégorie.</div>'; return; }
    let html = '<table class="list-table"><thead><tr><th></th><th>Produit</th><th>Catégorie</th><th>Prix</th><th>Menu</th><th>Prépa.</th><th>Actions</th></tr></thead><tbody>';
    items.forEach(p => {
      const catClass = 'cat-' + (p.categorie || '').toLowerCase();
      const isSelected = selectedItems.has(p.id);
      html += '<tr>'
        + '<td><button class="btn-select ' + (isSelected ? 'active' : '') + '" onclick="toggleSelect(\'' + p.id + '\')" style="border:none;padding:4px;background:none;">' + (isSelected ? '☑' : '☐') + '</button></td>'
        + '<td><span class="list-name">' + (p.nom || '—') + '</span></td>'
        + '<td><span class="menu-cat-badge ' + catClass + '">' + (p.categorie || '—') + '</span></td>'
        + '<td><span class="list-price">' + (p.prix ? p.prix.toFixed(2) + ' €' : '—') + '</span></td>'
        + '<td>' + (p.dispoMenu && p.prixMenu ? '<span class="list-price" style="color:#3B6D11;">' + p.prixMenu.toFixed(2) + ' €</span>' : '—') + '</td>'
        + '<td style="color:#9ab89a;font-size:12px;">' + (p.tempsPrepare ? p.tempsPrepare + ' min' : '—') + '</td>'
        + '<td><div style="display:flex;gap:4px;">'
        + '<button class="btn-edit" style="flex:none;" onclick="openModal(\'' + p.id + '\')">✏️</button>'
        + '<button class="btn-duplicate" onclick="duplicateProduct(\'' + p.id + '\')">📋</button>'
        + '<button class="btn-delete" onclick="deleteProduct(\'' + p.id + '\',\'' + (p.nom||'').replace(/'/g, "\\'") + '\')">🗑️</button>'
        + '</div></td></tr>';
    });
    html += '</tbody></table>';
    list.innerHTML = html;
  }

  function openModal(productId) {
    editingProductId = productId || null; selectedAllergenes = [];
    document.querySelectorAll('.allergen-chip').forEach(c => c.classList.remove('selected'));
    if (productId) {
      const p = allMenuItems.find(item => item.id === productId); if (!p) return;
      document.getElementById('modal-title').textContent = 'Modifier : ' + p.nom;
      document.getElementById('btn-save').textContent = 'Enregistrer';
      document.getElementById('m-nom').value = p.nom || '';
      document.getElementById('m-cat').value = p.categorie || 'Sandwich';
      document.getElementById('m-prix').value = p.prix || '';
      document.getElementById('m-prix-menu').value = p.prixMenu || '';
      document.getElementById('m-temps').value = p.tempsPrepare || '';
      document.getElementById('m-dispo-menu').checked = p.dispoMenu || false;
      document.getElementById('m-ingredients').value = p.ingredients || '';
      document.getElementById('m-retirables').value = p.ingredientsRetirables || '';
      selectedAllergenes = [...(p.allergenes || [])];
      document.querySelectorAll('.allergen-chip').forEach(c => { if (selectedAllergenes.includes(c.textContent)) c.classList.add('selected'); });
    } else {
      document.getElementById('modal-title').textContent = 'Ajouter un produit';
      document.getElementById('btn-save').textContent = 'Ajouter';
      ['m-nom','m-prix','m-prix-menu','m-temps','m-ingredients','m-retirables'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('m-cat').value = 'Sandwich'; document.getElementById('m-dispo-menu').checked = false;
    }
    document.getElementById('modal-overlay').classList.add('show');
    setTimeout(() => document.getElementById('m-nom').focus(), 100);
  }
  function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); editingProductId = null; }

  async function saveProduct() {
    const nom = document.getElementById('m-nom').value.trim();
    if (!nom) { toast('Le nom du produit est requis', 'error'); return; }
    const btn = document.getElementById('btn-save'); btn.disabled = true; const origText = btn.textContent; btn.textContent = 'Enregistrement...';
    const data = { nom, categorie: document.getElementById('m-cat').value, prix: parseFloat(document.getElementById('m-prix').value) || 0, prixMenu: parseFloat(document.getElementById('m-prix-menu').value) || 0, dispoMenu: document.getElementById('m-dispo-menu').checked, ingredients: document.getElementById('m-ingredients').value, ingredientsRetirables: document.getElementById('m-retirables').value, allergenes: selectedAllergenes, tempsPrepare: parseInt(document.getElementById('m-temps').value) || 0, restaurant: currentUser.restaurant, restaurantId: currentUser.restaurantId };
    try {
      if (editingProductId) { await fetch('/admin/menus/' + editingProductId, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); toast('Produit modifié avec succès'); }
      else { await fetch('/admin/menus', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); toast('Produit ajouté avec succès'); }
      closeModal(); await reloadMenu();
    } catch (e) { toast('Erreur: ' + e.message, 'error'); }
    btn.disabled = false; btn.textContent = origText;
  }

  async function deleteProduct(id, nom) {
    if (!confirm('Supprimer "' + nom + '" du menu ?')) return;
    try { await fetch('/admin/menus/' + id, { method: 'DELETE' }); toast('"' + nom + '" supprimé'); await reloadMenu(); } catch (e) { toast('Erreur suppression', 'error'); }
  }

  async function duplicateProduct(id) {
    const p = allMenuItems.find(item => item.id === id); if (!p) return;
    const data = { nom: p.nom + ' (copie)', categorie: p.categorie, prix: p.prix, prixMenu: p.prixMenu, dispoMenu: p.dispoMenu, ingredients: p.ingredients, ingredientsRetirables: p.ingredientsRetirables, allergenes: p.allergenes, tempsPrepare: p.tempsPrepare, restaurant: currentUser.restaurant, restaurantId: currentUser.restaurantId };
    try { await fetch('/admin/menus', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); toast('Produit dupliqué'); await reloadMenu(); } catch(e) { toast('Erreur duplication', 'error'); }
  }

  async function reloadMenu() {
    const menuRes = await fetch('/mon-menu/' + currentUser.restaurantId);
    allMenuItems = await menuRes.json();
    buildFilters(); applyFilters();
  }

  async function loadResto() {
    const restoId = currentUser.restaurantId;
    if (!restoId) { document.getElementById('resto-header').innerHTML = '<div style="font-size:13px;color:#9ab89a;">Aucun restaurant associé à ce compte.</div>'; return; }
    const [restoRes, menuRes] = await Promise.all([fetch('/mon-restaurant/' + restoId), fetch('/mon-menu/' + restoId)]);
    restoData = await restoRes.json(); allMenuItems = await menuRes.json();
    const catCount = new Set(allMenuItems.map(p => p.categorie)).size;
    document.getElementById('resto-header').innerHTML =
      '<div class="resto-avatar">' + initials(restoData.nom) + '</div>'
      + '<div><div class="resto-name">' + (restoData.nom || '—') + '</div>'
      + '<div class="resto-info">' + (restoData.email || '') + (restoData.telephone ? ' · ' + restoData.telephone : '') + '</div>'
      + '<span class="resto-badge">' + (restoData.abonnement || 'Mensuel') + '</span></div>'
      + '<div class="resto-stats">'
      + '<div class="resto-stat"><div class="resto-stat-value">' + allMenuItems.length + '</div><div class="resto-stat-label">Produits</div></div>'
      + '<div class="resto-stat"><div class="resto-stat-value">' + catCount + '</div><div class="resto-stat-label">Catégories</div></div>'
      + '</div>';
    buildFilters(); applyFilters(); renderHoraires(); renderInfos();
  }

  function renderHoraires() {
    const grid = document.getElementById('grid-horaires');
    try {
      const horaires = JSON.parse(restoData.horaires || '{}');
      if (!Object.keys(horaires).length) { grid.innerHTML = '<div class="empty">Aucun horaire configuré.</div>'; return; }
      grid.innerHTML = '';
      Object.entries(horaires).forEach(([jour, heure]) => {
        const div = document.createElement('div'); div.className = 'horaire-item';
        div.innerHTML = '<div class="horaire-day">' + jour + '</div>' + (heure === 'Fermé' ? '<div class="horaire-closed">Fermé</div>' : '<div class="horaire-time">' + heure + '</div>');
        grid.appendChild(div);
      });
    } catch(e) { grid.innerHTML = '<div class="empty">Aucun horaire configuré.</div>'; }
  }

  function renderInfos() {
    document.getElementById('grid-infos').innerHTML = '<div class="info-block"><div class="info-title">Coordonnées</div>'
      + '<div class="info-row"><span class="info-key">Nom</span><span class="info-val">' + (restoData.nom || '—') + '</span></div>'
      + '<div class="info-row"><span class="info-key">Email</span><span class="info-val">' + (restoData.email || '—') + '</span></div>'
      + '<div class="info-row"><span class="info-key">Téléphone</span><span class="info-val">' + (restoData.telephone || '—') + '</span></div>'
      + '<div class="info-row"><span class="info-key">Statut</span><span class="info-val">' + (restoData.statut || '—') + '</span></div>'
      + '<div class="info-row"><span class="info-key">Abonnement</span><span class="info-val">' + (restoData.abonnement || '—') + '</span></div>'
      + '<div class="info-row"><span class="info-key">Numéro Twilio</span><span class="info-val">' + (restoData.twilio || 'Non configuré') + '</span></div></div>';
  }

  function deconnexion() { sessionStorage.removeItem('user'); window.location.href = '/login.html'; }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); clearSelection(); }
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') { e.preventDefault(); document.getElementById('search-input').focus(); }
    if (e.ctrlKey && e.key === 'n') { e.preventDefault(); openModal(); }
  });

  loadResto();
</script>
</body>
</html>
