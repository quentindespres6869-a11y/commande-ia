<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon restaurant — Commande-IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f4f6f4; min-height: 100vh; color: #1a2a1a; }

    .topbar { background: #2d5c2d; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 64px; }
    .logo { font-size: 17px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 34px; height: 34px; border-radius: 9px; background: #4a8a1a; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 18px; height: 18px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .user-badge { font-size: 12px; color: #a8e07a; font-weight: 500; }
    .btn-topbar { font-size: 12px; padding: 6px 14px; border-radius: 7px; border: 1px solid rgba(200,232,200,0.2); background: transparent; color: rgba(200,232,200,0.7); cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: none; }
    .btn-topbar:hover { background: rgba(255,255,255,0.08); color: #fff; }

    .main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .resto-header { background: #fff; border-radius: 16px; padding: 24px 28px; border: 1.5px solid #e0ecd8; margin-bottom: 28px; display: flex; align-items: center; gap: 20px; }
    .resto-avatar { width: 56px; height: 56px; border-radius: 14px; background: #e8f5dc; border: 1.5px solid #c0e090; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #2d6a0a; flex-shrink: 0; }
    .resto-name { font-size: 22px; font-weight: 700; color: #1a2a1a; }
    .resto-info { font-size: 13px; color: #9ab89a; margin-top: 4px; }
    .resto-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-top: 6px; background: #e8f5dc; color: #2d6a0a; border: 1px solid #c0e090; }

    .tabs { display: flex; gap: 4px; background: #fff; padding: 4px; border-radius: 10px; border: 1.5px solid #e0ecd8; margin-bottom: 24px; width: fit-content; }
    .tab { font-size: 13px; padding: 7px 20px; border-radius: 7px; border: none; background: transparent; color: #7aaa7a; cursor: pointer; font-weight: 500; font-family: 'Inter', sans-serif; }
    .tab.active { background: #2d5c2d; color: #fff; font-weight: 600; }

    .section { display: none; }
    .section.active { display: block; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-size: 15px; font-weight: 700; color: #1a2a1a; }

    .menu-filters { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 1.5px solid #e0ecd8; background: #fff; color: #5a7a5a; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; }
    .filter-btn.active { background: #2d5c2d; color: #fff; border-color: #2d5c2d; }

    .btn-add { font-size: 12px; padding: 7px 16px; border-radius: 8px; border: none; background: #3B6D11; color: #fff; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; }
    .btn-add:hover { background: #2d5c0a; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

    .menu-card { background: #fff; border: 1.5px solid #e0ecd8; border-radius: 14px; padding: 16px; position: relative; }
    .menu-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .menu-card-name { font-size: 14px; font-weight: 700; color: #1a2a1a; }
    .menu-cat-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
    .cat-sandwich { background: #e8f0ff; color: #2a50aa; border: 1px solid #b0c8f8; }
    .cat-boisson { background: #e8f5dc; color: #2d6a0a; border: 1px solid #c0e090; }
    .cat-accompagnement { background: #fff8e8; color: #906010; border: 1px solid #e8d090; }
    .cat-dessert { background: #fdf0ff; color: #8030aa; border: 1px solid #e0b0f0; }
    .cat-menu { background: #f0e8ff; color: #5030aa; border: 1px solid #c0a8f0; }

    .menu-card-divider { height: 1px; background: #f0f5ee; margin: 8px 0; }
    .menu-card-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; }
    .menu-card-key { color: #9ab89a; }
    .menu-card-val { color: #1a2a1a; font-weight: 600; }
    .menu-ingredients { font-size: 11px; color: #7aaa7a; margin-top: 6px; line-height: 1.5; }
    .menu-retirables { font-size: 11px; color: #906010; margin-top: 4px; background: #fff8e8; padding: 4px 8px; border-radius: 6px; }
    .menu-allergenes { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .allergen-badge { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: #fef0f0; color: #b03030; border: 1px solid #f0c0c0; }

    .menu-card-actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f5ee; }
    .btn-edit { font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid #e0ecd8; background: #f8faf6; color: #5a7a5a; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; flex: 1; }
    .btn-edit:hover { background: #e8f5dc; border-color: #3B6D11; color: #3B6D11; }
    .btn-delete { font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid #f0c0c0; background: #fef8f8; color: #b03030; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; }
    .btn-delete:hover { background: #fef0f0; }

    .horaires-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .horaire-item { background: #fff; border: 1.5px solid #e0ecd8; border-radius: 10px; padding: 12px; }
    .horaire-day { font-size: 12px; font-weight: 700; color: #3B6D11; margin-bottom: 4px; }
    .horaire-time { font-size: 13px; color: #1a2a1a; font-weight: 500; }
    .horaire-closed { font-size: 13px; color: #9ab89a; }

    .info-block { background: #fff; border: 1.5px solid #e0ecd8; border-radius: 14px; padding: 20px; margin-bottom: 14px; }
    .info-title { font-size: 11px; font-weight: 700; color: #7aaa7a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f5ee; font-size: 13px; }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: #9ab89a; font-weight: 500; }
    .info-val { color: #1a2a1a; font-weight: 600; }

    .loading { text-align: center; font-size: 13px; color: #9ab89a; padding: 40px 0; }
    .empty { text-align: center; font-size: 13px; color: #9ab89a; padding: 40px 0; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 28px; width: 100%; max-width: 520px; max-height: 85vh; overflow-y: auto; border: 1.5px solid #e0ecd8; }
    .modal-title { font-size: 16px; font-weight: 700; color: #1a2a1a; margin-bottom: 20px; }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 11px; font-weight: 600; color: #5a7a5a; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; display: block; }
    .form-input { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1.5px solid #e0ecd8; background: #f8faf6; font-size: 13px; font-family: 'Inter', sans-serif; color: #1a2a1a; outline: none; }
    .form-input:focus { border-color: #3B6D11; }
    .form-select { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1.5px solid #e0ecd8; background: #f8faf6; font-size: 13px; font-family: 'Inter', sans-serif; color: #1a2a1a; outline: none; }
    .form-textarea { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1.5px solid #e0ecd8; background: #f8faf6; font-size: 13px; font-family: 'Inter', sans-serif; color: #1a2a1a; outline: none; resize: vertical; min-height: 50px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-row-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
    .form-check { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #5a7a5a; margin-top: 6px; }
    .form-check input { accent-color: #3B6D11; }
    .allergenes-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 6px; }
    .allergen-chip { font-size: 10px; padding: 4px 6px; border-radius: 5px; border: 1px solid #e0ecd8; background: #f8faf6; color: #5a7a5a; cursor: pointer; text-align: center; }
    .allergen-chip.selected { background: #fef0f0; border-color: #f0c0c0; color: #b03030; font-weight: 600; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-save { flex: 1; padding: 11px; border-radius: 8px; border: none; background: #3B6D11; color: #fff; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; }
    .btn-save:hover { background: #2d5c0a; }
    .btn-cancel { flex: 1; padding: 11px; border-radius: 8px; border: 1.5px solid #e0ecd8; background: #fff; color: #5a7a5a; font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; }
    .btn-cancel:hover { background: #f8faf6; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 18 18" fill="none"><path d="M3 5h12M3 9h8M3 13h10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
    </div>
    Commande<span style="color:#a8e07a">IA</span>
  </div>
  <div class="topbar-right">
    <span class="user-badge" id="user-name">Chargement...</span>
    <a href="/" class="btn-topbar">Dashboard commandes</a>
    <button class="btn-topbar" onclick="deconnexion()">Déconnexion</button>
  </div>
</div>

<div class="main">
  <div class="resto-header" id="resto-header">
    <div class="loading">Chargement des informations du restaurant...</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('menu', this)">Menu & Carte</button>
    <button class="tab" onclick="switchTab('horaires', this)">Horaires</button>
    <button class="tab" onclick="switchTab('infos', this)">Informations</button>
  </div>

  <!-- MENU -->
  <div class="section active" id="section-menu">
    <div class="section-header">
      <div>
        <div class="section-title">Menu du restaurant</div>
        <span id="menu-count" style="font-size:12px;color:#9ab89a;"></span>
      </div>
      <button class="btn-add" onclick="openModal()">+ Ajouter un produit</button>
    </div>
    <div class="menu-filters">
      <button class="filter-btn active" onclick="filterMenu('tous', this)">Tous</button>
      <button class="filter-btn" onclick="filterMenu('Sandwich', this)">Sandwichs</button>
      <button class="filter-btn" onclick="filterMenu('Boisson', this)">Boissons</button>
      <button class="filter-btn" onclick="filterMenu('Accompagnement', this)">Accompagnements</button>
      <button class="filter-btn" onclick="filterMenu('Dessert', this)">Desserts</button>
      <button class="filter-btn" onclick="filterMenu('Menu', this)">Menus</button>
    </div>
    <div class="grid" id="grid-menu"><div class="loading">Chargement du menu...</div></div>
  </div>

  <!-- HORAIRES -->
  <div class="section" id="section-horaires">
    <div class="section-header"><div class="section-title">Horaires d'ouverture</div></div>
    <div class="horaires-grid" id="grid-horaires"><div class="loading">Chargement...</div></div>
  </div>

  <!-- INFOS -->
  <div class="section" id="section-infos">
    <div class="section-header"><div class="section-title">Informations du restaurant</div></div>
    <div id="grid-infos"><div class="loading">Chargement...</div></div>
  </div>
</div>

<!-- MODAL AJOUT/MODIFICATION PRODUIT -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-title">Ajouter un produit</div>

    <div class="form-row-3">
      <div class="form-group">
        <label class="form-label">Nom du produit</label>
        <input class="form-input" id="m-nom" placeholder="Ex: Big Mac" />
      </div>
      <div class="form-group">
        <label class="form-label">Catégorie</label>
        <select class="form-select" id="m-cat">
          <option>Sandwich</option><option>Boisson</option><option>Accompagnement</option><option>Dessert</option><option>Menu</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Prix seul (€)</label>
        <input class="form-input" id="m-prix" type="number" step="0.01" placeholder="6.00" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prix menu (€)</label>
        <input class="form-input" id="m-prix-menu" type="number" step="0.01" placeholder="11.00" />
      </div>
      <div class="form-group">
        <label class="form-label">Temps préparation (min)</label>
        <input class="form-input" id="m-temps" type="number" placeholder="5" />
      </div>
    </div>

    <label class="form-check">
      <input type="checkbox" id="m-dispo-menu" /> Disponible en menu (frites + boisson)
    </label>

    <div style="height:12px"></div>

    <div class="form-group">
      <label class="form-label">Composition / Ingrédients</label>
      <textarea class="form-textarea" id="m-ingredients" placeholder="pain, steak, salade, tomate..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Ingrédients retirables (séparés par des virgules)</label>
      <input class="form-input" id="m-retirables" placeholder="cornichons, oignons, sauce" />
    </div>

    <div class="form-group">
      <label class="form-label">Allergènes présents</label>
      <div class="allergenes-grid" id="allergenes-grid"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" id="btn-save" onclick="saveProduct()">Ajouter</button>
    </div>
  </div>
</div>

<script>
  const user = sessionStorage.getItem('user');
  if (!user) window.location.href = '/login.html?redirect=/restaurant.html';
  const currentUser = JSON.parse(user || '{}');
  document.getElementById('user-name').textContent = currentUser.nom;

  let allMenuItems = [];
  let restoData = null;
  let editingProductId = null;
  let selectedAllergenes = [];

  const ALLERGENES = ['Gluten','Lactose','Oeufs','Arachides','Fruits à coque','Soja','Poisson','Crustacés','Céleri','Moutarde','Sésame','Sulfites','Lupin','Mollusques'];

  // Initialiser les chips allergènes dans le modal
  const ag = document.getElementById('allergenes-grid');
  ALLERGENES.forEach(a => {
    const chip = document.createElement('div');
    chip.className = 'allergen-chip';
    chip.textContent = a;
    chip.onclick = () => {
      chip.classList.toggle('selected');
      if (chip.classList.contains('selected')) selectedAllergenes.push(a);
      else selectedAllergenes = selectedAllergenes.filter(x => x !== a);
    };
    ag.appendChild(chip);
  });

  function initials(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('section-' + tab).classList.add('active');
  }

  function filterMenu(cat, el) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    const filtered = cat === 'tous' ? allMenuItems : allMenuItems.filter(p => p.categorie === cat);
    renderMenuGrid(filtered);
  }

  function renderMenuGrid(items) {
    const grid = document.getElementById('grid-menu');
    if (!items.length) { grid.innerHTML = '<div class="empty">Aucun produit dans cette catégorie.</div>'; return; }
    grid.innerHTML = '';
    items.forEach(p => {
      const catClass = 'cat-' + (p.categorie || '').toLowerCase();
      const card = document.createElement('div');
      card.className = 'menu-card';
      card.innerHTML = `
        <div class="menu-card-top">
          <div class="menu-card-name">${p.nom || '—'}</div>
          <span class="menu-cat-badge ${catClass}">${p.categorie || '—'}</span>
        </div>
        <div class="menu-card-divider"></div>
        <div class="menu-card-row"><span class="menu-card-key">Prix seul</span><span class="menu-card-val">${p.prix ? p.prix.toFixed(2) + ' €' : '—'}</span></div>
        ${p.dispoMenu ? `<div class="menu-card-row"><span class="menu-card-key">Prix menu</span><span class="menu-card-val">${p.prixMenu ? p.prixMenu.toFixed(2) + ' €' : '—'}</span></div>` : ''}
        ${p.tempsPrepare ? `<div class="menu-card-row"><span class="menu-card-key">Préparation</span><span class="menu-card-val">${p.tempsPrepare} min</span></div>` : ''}
        ${p.ingredients ? `<div class="menu-ingredients">${p.ingredients}</div>` : ''}
        ${p.ingredientsRetirables ? `<div class="menu-retirables">Retirables : ${p.ingredientsRetirables}</div>` : ''}
        ${p.allergenes?.length ? `<div class="menu-allergenes">${p.allergenes.map(a => '<span class="allergen-badge">' + a + '</span>').join('')}</div>` : ''}
        <div class="menu-card-actions">
          <button class="btn-edit" onclick="openModal('${p.id}')">✏️ Modifier</button>
          <button class="btn-delete" onclick="deleteProduct('${p.id}', '${(p.nom || '').replace(/'/g, "\\'")}')">🗑️ Supprimer</button>
        </div>`;
      grid.appendChild(card);
    });
  }

  // ─── MODAL ──────────────────────────────────────────

  function openModal(productId) {
    editingProductId = productId || null;
    selectedAllergenes = [];
    document.querySelectorAll('.allergen-chip').forEach(c => c.classList.remove('selected'));

    if (productId) {
      // Mode modification — pré-remplir le formulaire
      const p = allMenuItems.find(item => item.id === productId);
      if (!p) return;
      document.getElementById('modal-title').textContent = 'Modifier : ' + p.nom;
      document.getElementById('btn-save').textContent = 'Enregistrer';
      document.getElementById('m-nom').value = p.nom || '';
      document.getElementById('m-cat').value = p.categorie || 'Sandwich';
      document.getElementById('m-prix').value = p.prix || '';
      document.getElementById('m-prix-menu').value = p.prixMenu || '';
      document.getElementById('m-temps').value = p.tempsPrepare || '';
      document.getElementById('m-dispo-menu').checked = p.dispoMenu || false;
      document.getElementById('m-ingredients').value = p.ingredients || '';
      document.getElementById('m-retirables').value = p.ingredientsRetirables || '';
      selectedAllergenes = [...(p.allergenes || [])];
      document.querySelectorAll('.allergen-chip').forEach(c => {
        if (selectedAllergenes.includes(c.textContent)) c.classList.add('selected');
      });
    } else {
      // Mode ajout — formulaire vide
      document.getElementById('modal-title').textContent = 'Ajouter un produit';
      document.getElementById('btn-save').textContent = 'Ajouter';
      ['m-nom','m-prix','m-prix-menu','m-temps','m-ingredients','m-retirables'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('m-cat').value = 'Sandwich';
      document.getElementById('m-dispo-menu').checked = false;
    }

    document.getElementById('modal-overlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
    editingProductId = null;
  }

  async function saveProduct() {
    const nom = document.getElementById('m-nom').value.trim();
    if (!nom) { alert('Le nom du produit est requis'); return; }

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.textContent = 'Enregistrement...';

    const data = {
      nom,
      categorie: document.getElementById('m-cat').value,
      prix: parseFloat(document.getElementById('m-prix').value) || 0,
      prixMenu: parseFloat(document.getElementById('m-prix-menu').value) || 0,
      dispoMenu: document.getElementById('m-dispo-menu').checked,
      ingredients: document.getElementById('m-ingredients').value,
      ingredientsRetirables: document.getElementById('m-retirables').value,
      allergenes: selectedAllergenes,
      tempsPrepare: parseInt(document.getElementById('m-temps').value) || 0,
      restaurant: currentUser.restaurant,
      restaurantId: currentUser.restaurantId
    };

    try {
      if (editingProductId) {
        // Modification
        await fetch('/admin/menus/' + editingProductId, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      } else {
        // Ajout
        await fetch('/admin/menus', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      }
      closeModal();
      await reloadMenu();
    } catch (e) {
      alert('Erreur: ' + e.message);
    }

    btn.disabled = false;
    btn.textContent = editingProductId ? 'Enregistrer' : 'Ajouter';
  }

  async function deleteProduct(id, nom) {
    if (!confirm('Supprimer "' + nom + '" du menu ?')) return;
    try {
      await fetch('/admin/menus/' + id, { method: 'DELETE' });
      await reloadMenu();
    } catch (e) {
      alert('Erreur suppression: ' + e.message);
    }
  }

  async function reloadMenu() {
    const menuRes = await fetch('/mon-menu/' + currentUser.restaurantId);
    allMenuItems = await menuRes.json();
    document.getElementById('menu-count').textContent = allMenuItems.length + ' produit' + (allMenuItems.length > 1 ? 's' : '');
    renderMenuGrid(allMenuItems);
    // Reset filter to "tous"
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn').classList.add('active');
  }

  async function loadResto() {
    const restoId = currentUser.restaurantId;
    if (!restoId) {
      document.getElementById('resto-header').innerHTML = '<div style="font-size:13px;color:#9ab89a;">Aucun restaurant associé à ce compte.</div>';
      return;
    }

    const [restoRes, menuRes] = await Promise.all([
      fetch('/mon-restaurant/' + restoId),
      fetch('/mon-menu/' + restoId)
    ]);

    restoData = await restoRes.json();
    allMenuItems = await menuRes.json();

    document.getElementById('menu-count').textContent = allMenuItems.length + ' produit' + (allMenuItems.length > 1 ? 's' : '');

    document.getElementById('resto-header').innerHTML = `
      <div class="resto-avatar">${initials(restoData.nom)}</div>
      <div>
        <div class="resto-name">${restoData.nom || '—'}</div>
        <div class="resto-info">${restoData.email || ''} ${restoData.telephone ? '· ' + restoData.telephone : ''}</div>
        <span class="resto-badge">${restoData.abonnement || 'Mensuel'}</span>
      </div>`;

    renderMenuGrid(allMenuItems);
    renderHoraires();
    renderInfos();
  }

  function renderHoraires() {
    const grid = document.getElementById('grid-horaires');
    try {
      const horaires = JSON.parse(restoData.horaires || '{}');
      if (!Object.keys(horaires).length) { grid.innerHTML = '<div class="empty">Aucun horaire configuré.</div>'; return; }
      grid.innerHTML = '';
      Object.entries(horaires).forEach(([jour, heure]) => {
        const div = document.createElement('div');
        div.className = 'horaire-item';
        div.innerHTML = `<div class="horaire-day">${jour}</div>${heure === 'Fermé' ? '<div class="horaire-closed">Fermé</div>' : '<div class="horaire-time">' + heure + '</div>'}`;
        grid.appendChild(div);
      });
    } catch(e) { grid.innerHTML = '<div class="empty">Aucun horaire configuré.</div>'; }
  }

  function renderInfos() {
    document.getElementById('grid-infos').innerHTML = `
      <div class="info-block">
        <div class="info-title">Coordonnées</div>
        <div class="info-row"><span class="info-key">Nom</span><span class="info-val">${restoData.nom || '—'}</span></div>
        <div class="info-row"><span class="info-key">Email</span><span class="info-val">${restoData.email || '—'}</span></div>
        <div class="info-row"><span class="info-key">Téléphone</span><span class="info-val">${restoData.telephone || '—'}</span></div>
        <div class="info-row"><span class="info-key">Statut</span><span class="info-val">${restoData.statut || '—'}</span></div>
        <div class="info-row"><span class="info-key">Abonnement</span><span class="info-val">${restoData.abonnement || '—'}</span></div>
        <div class="info-row"><span class="info-key">Numéro Twilio</span><span class="info-val">${restoData.twilio || 'Non configuré'}</span></div>
      </div>`;
  }

  function deconnexion() {
    sessionStorage.removeItem('user');
    window.location.href = '/login.html';
  }

  loadResto();
</script>
</body>
</html>
